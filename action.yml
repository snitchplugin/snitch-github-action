name: "Snitch GitHub Action"
description: "Security review on every pull request. Free with GitHub Models, or bring your own AI provider key. Sticky PR comment + SARIF upload."
author: "Snitch (snitchplugin.com)"

branding:
  icon: "shield"
  color: "red"

inputs:
  snitch-license-key:
    description: "Snitch license key from snitchplugin.com/dashboard/keys"
    required: true

  github-token:
    description: "GitHub token used to post PR comments, commit statuses, and SARIF. Defaults to the workflow's built-in token."
    required: false
    default: ${{ github.token }}

  openrouter-api-key:
    description: "OpenRouter API key. Pay-per-token, one key for every model. Optional — only needed if you set `model:` to something other than the GitHub Models default."
    required: false
  anthropic-api-key:
    description: "Anthropic API key. Optional — used when `provider: anthropic` or when no other key is present."
    required: false
  openai-api-key:
    description: "OpenAI API key. Optional — used when `provider: openai` or when no other key is present."
    required: false
  google-api-key:
    description: "Google AI Studio API key (Gemini). Optional — used when `provider: google` or when no other key is present."
    required: false
  copilot-token:
    description: "Token for the GitHub Models inference endpoint. Defaults to the workflow's GITHUB_TOKEN, which gives you a free tier when the workflow declares `permissions: models: read`. Override with a Copilot subscription token or a PAT for a higher rate limit."
    required: false
    default: ${{ github.token }}

  trigger-mode:
    description: "When to run: smart | always | manual. Default smart. Can be overridden by .snitch.yml."
    required: false
    default: "smart"
  provider:
    description: "Force a specific provider. If unset, auto-selected from which keys are present."
    required: false
  model:
    description: "Provider-relative model id. Falls back to provider default when unset."
    required: false
  fail-on:
    description: "Fail the check if findings at this severity or above are present: critical | high | medium | low | none."
    required: false
    default: "high"
  categories:
    description: "Comma-separated category numbers (e.g. '1,2,5'). Omit to auto-detect from changed file extensions."
    required: false
  paths:
    description: "Comma-separated glob filters. Files matching these globs are scanned; others are skipped."
    required: false
  sarif-output-path:
    description: "Where to write the SARIF report on the runner. Use this when a downstream step (codeql-action/upload-sarif, custom upload, etc.) expects the file at a specific path. Parent directories are created if needed."
    required: false
    default: "SECURITY_AUDIT_REPORT.sarif"
  markdown-output-path:
    description: "Where to write the human-readable Markdown report. Same file is also dumped into the workflow log and the GitHub Actions Job Summary. Parent directories are created if needed."
    required: false
    default: "SECURITY_AUDIT_REPORT.md"
  batch-size:
    description: "How many files to send to the AI provider per call. Default 5. Smaller batches give more accurate findings on large diffs but take longer; larger batches are faster but the model may hurry. Override per-workflow if needed."
    required: false
    default: "5"
  max-file-bytes:
    description: "Skip files larger than this many bytes. Default 100000 (100 KB). Most model context windows can't fit a single huge file alongside the methodology, and minified / generated files usually aren't worth the quota. Override to scan larger files."
    required: false
    default: "100000"
  max-files:
    description: "Hard cap on total files scanned per PR. Default 50. Protects against PRs with hundreds of files (lockfile bumps, generated dumps) blowing through quota and runtime budget. Combine with the `paths` input for targeted scanning."
    required: false
    default: "50"
  disable-inline-review:
    description: "Set to 'true' to skip posting inline review comments on the PR diff. Useful when GitHub Advanced Security is enabled — Code Scanning already renders SARIF findings on the diff, so the inline comments duplicate them. The sticky summary comment + SARIF upload + artifact still run."
    required: false
    default: "false"

outputs:
  findings-count:
    description: "Total number of findings produced by this scan."
  critical-count:
    description: "Number of critical-severity findings."
  high-count:
    description: "Number of high-severity findings."
  report-url:
    description: "URL of the PR comment containing the report."
  scan-id:
    description: "Snitch scan id (for dashboard correlation)."
  provider-used:
    description: "Which provider was selected for this scan."
  model-used:
    description: "Which model was selected for this scan."

runs:
  using: "node20"
  main: "dist/index.js"
